name: Dual Repo Split & Sync

on:
  push:
    branches:
      - main

jobs:
  split-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Dex (Source)
        uses: actions/checkout@v4
        with:
          path: Dex
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Manual Sync and Cleanup
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config --global user.email "yonoapptransparency@example.com"
          git config --global user.name "yonoapptransparency"

          ADMIN_ONLY_FILES=(
            "src/pages/AdminDashboard.tsx"
            "src/pages/AdminLogin.tsx"
            "src/components/NewsTab.tsx"
            "src/lib/githubSync.ts"
            "api/"
            "server.ts"
            "firebase-applet-config.json"
            "firestore.rules"
            "firebase.json"
            "add-admin.ts"
            "fix-admin.ts"
            "add-admin-rest.ts"
            "debug-db.js"
            "verify-db.js"
            "verify-rules.js"
            "check-env.ts"
            "test-models-all.ts"
            "test-payload.mjs"
            "add_save_button.js"
            "extract.js"
            "fetch_git_cfg.js"
            "fetch_real_git_cfg.js"
            "fetch_rest.js"
            "find_app_cache.js"
            "fix_admin_dashboard.js"
            "fix-aes.ts"
            "fix-api.ts"
            "fix_app_layout.js"
            "fix_appstab.js"
            "fix_css.js"
            "fix_css_performance.js"
            "fix-dashboard.ts"
            "fix-download.ts"
            "fix_h2.js"
            "fix_header.js"
            "fix_home.js"
            "fix_home_layout.js"
            "fix_lazy.js"
            "fix_lenis_easing.js"
            "fix_lenis.js"
            "fix_lenis_settings.js"
            "fix_lenis_ultra2.js"
            "fix_lenis_ultra.js"
            "fix_loading_all.js"
            "fix_loading_home.js"
            "fix_loading.js"
            "fix_menu.js"
            "fix-missing-urls.cjs"
            "fix_newsdetail_date.js"
            "fix_newspage_date.js"
            "fix_news_published_at.js"
            "fix_news_seo.js"
            "fix_news_tab.js"
            "fix_routes.js"
            "fix_scroll.js"
            "fix_secrets.sh"
            "fix-seo.js"
            "fix-seo.ts"
            "fix_server2.js"
            "fix_server3.js"
            "fix_server.js"
            "get_git_config.ts"
            "insert_screenshots.js"
            "patch.js"
            "patch2.js"
            "patch3.js"
            "patch4.js"
            "patch5.js"
            "patch6.js"
            "patch7.js"
            "patch8.js"
            "patch_menu.js"
            "print-env.ts"
            "remove_chatbot.js"
            "replace-color.mjs"
            "restore_app.js"
            "restore_header_footer.js"
            "test-admin-encrypt.js"
            "test-admin.js"
            "test-chat.ts"
            "test-chunk-item.cjs"
            "test-curl.ts"
            "test-fetch.ts"
            "test-firestore.ts"
            "test-gemini.ts"
            "test.js"
            "test-pow.mjs"
            "test_pull.js"
            "test-secure-links.ts"
            "update_appdetails.js"
            "update_app_home.js"
            "update_app.js"
            "update_dashboard.patch"
            "update_gateway.js"
            "update_home.js"
            "update_html.js"
            "update_loading.js"
            "update_vite.js"
            "write_files.js"
            "src/components/SecurityTab.tsx"
            "src/components/FirebaseStatusPanel.tsx"
            "src/components/ClearanceButton.tsx"
            "src/components/AdminLogin.tsx"
          )

          SHARED_FILES=(
            "package.json"
            "package-lock.json"
            "tsconfig.json"
            "vite.config.ts"
            "scripts/"
            ".env.example"
            "README.md"
          )

          echo "Cloning masterworld repository..."
          cd ..
          # Clone the repo (it's okay if it's empty)
          git clone https://x-access-token:${PAT}@github.com/yonoapptransparency/masterworld.git masterworld_repo || mkdir masterworld_repo
          
          echo "Copying files to masterworld..."
          for file in "${ADMIN_ONLY_FILES[@]}" "${SHARED_FILES[@]}"; do
            if [ -e "Dex/$file" ]; then
              dest_dir="masterworld_repo/$(dirname "$file")"
              mkdir -p "$dest_dir"
              cp -r "Dex/$file" "$dest_dir/"
              echo "Copied $file to masterworld"
            fi
          done

          cd masterworld_repo
          # Initialize git if it's a completely empty folder
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:${PAT}@github.com/yonoapptransparency/masterworld.git
          fi
          
          # Ensure we are on the main branch
          git checkout -b main || git checkout main
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sync Admin & Backend from Dex [skip ci]"
            # Force push if it's the first time, or regular push
            git push -u origin main
          else
            echo "No changes to push to masterworld."
          fi

          echo "Cleaning up Dex repository..."
          cd ../Dex
          for file in "${ADMIN_ONLY_FILES[@]}"; do
            if [ -e "$file" ]; then
              git rm -rf "$file"
              echo "Deleted $file from Dex"
            fi
          done

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: isolate public repo by removing admin logic [skip ci]"
            # Use origin which is already configured by actions/checkout with the PAT
            git push origin main
          else
            echo "No admin files found to remove in Dex."
          fi

