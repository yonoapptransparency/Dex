name: Dual Repo Split & Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  split-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We use GITHUB_TOKEN for the source repo to avoid 403 errors if PAT is only for targets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Manual Sync to Dex and Masterworld
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config --global user.email "yonoapptransparency@example.com"
          git config --global user.name "yonoapptransparency"

          # List of files that should ONLY exist in Masterworld (Admin)
          ADMIN_ONLY_FILES=(
            "src/pages/AdminDashboard.tsx"
            "src/pages/AdminLogin.tsx"
            "src/components/NewsTab.tsx"
            "src/lib/githubSync.ts"
            "api/"
            "server.ts"
            "firebase-applet-config.json"
            "firestore.rules"
            "firebase.json"
            "add-admin.ts"
            "fix-admin.ts"
            "add-admin-rest.ts"
            "debug-db.js"
            "verify-db.js"
            "verify-rules.js"
            "check-env.ts"
            "test-models-all.ts"
            "test-payload.mjs"
            "add_save_button.js"
            "extract.js"
            "fetch_git_cfg.js"
            "fetch_real_git_cfg.js"
            "fetch_rest.js"
            "find_app_cache.js"
            "fix_admin_dashboard.js"
            "fix-aes.ts"
            "fix-api.ts"
            "fix_app_layout.js"
            "fix_appstab.js"
            "fix_css.js"
            "fix_css_performance.js"
            "fix-dashboard.ts"
            "fix-download.ts"
            "fix_h2.js"
            "fix_header.js"
            "fix_home.js"
            "fix_home_layout.js"
            "fix_lazy.js"
            "fix_lenis_easing.js"
            "fix_lenis.js"
            "fix_lenis_settings.js"
            "fix_lenis_ultra2.js"
            "fix_lenis_ultra.js"
            "fix_loading_all.js"
            "fix_loading_home.js"
            "fix_loading.js"
            "fix_menu.js"
            "fix-missing-urls.cjs"
            "fix_newsdetail_date.js"
            "fix_newspage_date.js"
            "fix_news_published_at.js"
            "fix_news_seo.js"
            "fix_news_tab.js"
            "fix_routes.js"
            "fix_scroll.js"
            "fix_secrets.sh"
            "fix-seo.js"
            "fix-seo.ts"
            "fix_server2.js"
            "fix_server3.js"
            "fix_server.js"
            "get_git_config.ts"
            "insert_screenshots.js"
            "patch.js"
            "patch2.js"
            "patch3.js"
            "patch4.js"
            "patch5.js"
            "patch6.js"
            "patch7.js"
            "patch8.js"
            "patch_menu.js"
            "print-env.ts"
            "remove_chatbot.js"
            "replace-color.mjs"
            "restore_app.js"
            "restore_header_footer.js"
            "test-admin-encrypt.js"
            "test-admin.js"
            "test-chat.ts"
            "test-chunk-item.cjs"
            "test-curl.ts"
            "test-fetch.ts"
            "test-firestore.ts"
            "test-gemini.ts"
            "test.js"
            "test-pow.mjs"
            "test_pull.js"
            "test-secure-links.ts"
            "update_appdetails.js"
            "update_app_home.js"
            "update_app.js"
            "update_dashboard.patch"
            "update_gateway.js"
            "update_home.js"
            "update_html.js"
            "update_loading.js"
            "update_vite.js"
            "write_files.js"
            "src/components/SecurityTab.tsx"
            "src/components/FirebaseStatusPanel.tsx"
            "src/components/ClearanceButton.tsx"
            "src/components/AdminLogin.tsx"
          )

          # SOURCE_DIR is the current directory after checkout
          SOURCE_DIR=$(pwd)
          PARENT_DIR=$(dirname "$SOURCE_DIR")

          echo "--- Processing Masterworld (Admin) ---"
          cd "$PARENT_DIR"
          rm -rf masterworld_repo
          # Clone with PAT. If it fails (e.g. empty repo), we init it.
          git clone https://x-access-token:${PAT}@github.com/yonoapptransparency/masterworld.git masterworld_repo || (mkdir masterworld_repo && cd masterworld_repo && git init && git remote add origin https://x-access-token:${PAT}@github.com/yonoapptransparency/masterworld.git && cd ..)
          
          # Sync EVERYTHING to masterworld
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='dist' "$SOURCE_DIR/" masterworld_repo/
          
          cd masterworld_repo
          git checkout -b main || git checkout main
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sync Admin from Source [skip ci]"
            git push -u origin main
          else
            echo "No changes for Masterworld."
          fi
          cd "$SOURCE_DIR"

          echo "--- Processing Dex (Public) ---"
          cd "$PARENT_DIR"
          rm -rf dex_repo
          # Clone with PAT
          git clone https://x-access-token:${PAT}@github.com/yonoapptransparency/Dex.git dex_repo || (mkdir dex_repo && cd dex_repo && git init && git remote add origin https://x-access-token:${PAT}@github.com/yonoapptransparency/Dex.git && cd ..)
          
          # Sync EVERYTHING to Dex
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='dist' "$SOURCE_DIR/" dex_repo/
          
          # REMOVE Admin Files from Dex
          cd dex_repo
          for file in "${ADMIN_ONLY_FILES[@]}"; do
            if [ -e "$file" ]; then
              rm -rf "$file"
              echo "Removed $file from Dex"
            fi
          done
          
          git checkout -b main || git checkout main
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sync Clean Website to Dex [skip ci]"
            git push -u origin main
          else
            echo "No changes for Dex."
          fi
          cd "$SOURCE_DIR"

          echo "--- Sync Complete ---"
